<!DOCTYPE html>

<html>
<head>

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:url("https://images.unsplash.com/photo-1579154204601-01588f351e67");
background-size:cover;
font-family:Arial;
}

.overlay{
background:rgba(0,0,0,0.5);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.register-card{

width:520px;

background:linear-gradient(135deg,#ffffff,#f1f5ff);

padding:50px;

border-radius:15px;

box-shadow:0 15px 40px rgba(0,0,0,0.4);

}

</style>

</head>

<body>

<div class="overlay">

<div class="register-card">

<h2 class="text-center mb-4">User Registration</h2>

{% if error %}

<div class="alert alert-danger text-center">
{{ error }}
</div>
{% endif %}

<form method="POST">

<label>Name</label> <input type="text" name="name" class="form-control" required>

<br>

<label>Email</label> <input type="email" name="email" class="form-control" required>

<br>

<label>Password</label> <input type="password" name="password" class="form-control" required>

<br>

<button class="btn btn-success w-100">Register</button>

</form>

<br>

<p class="text-center">
<a href="/login">Already have an account?</a>
</p>

</div>

</div>

</body>
</html>
